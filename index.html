<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>影视追踪</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <a class="logo" onclick="location.reload()">🎬 影视追踪</a>
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="搜索电影、电视剧，支持中文..." autocomplete="off">
      <div id="searchDropdown" class="search-dropdown"></div>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h2>📋 已追</h2>
        <div id="myShowsList" class="my-shows-list">
          <p class="empty-hint">标记已看后<br>自动出现在这里</p>
        </div>
      </div>
      <div class="sidebar-section">
        <h2>🎬 想看</h2>
        <div id="watchlistList" class="my-shows-list">
          <p class="empty-hint">搜索作品 → 加入想看<br>随时翻出来</p>
        </div>
      </div>
      <div class="sidebar-actions">
        <button id="exportBtn" class="btn-sm">💾 导出</button>
        <button id="importBtn" class="btn-sm">📥 导入</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🎬</div>
        <h1>影视追踪</h1>
        <p>搜索电影、美剧、日剧、韩剧、英剧……标记已看，不再忘记</p>
        <div class="quick-shows">
          <span>试试：</span>
          <button class="quick-btn" data-query="Breaking Bad">绝命毒师</button>
          <button class="quick-btn" data-query="Inception">盗梦空间</button>
          <button class="quick-btn" data-query="Stranger Things">怪奇物语</button>
          <button class="quick-btn" data-query="寄生虫">寄生虫</button>
          <button class="quick-btn" data-query="進撃の巨人">进击的巨人</button>
        </div>
      </div>

      <div id="showDetail" class="show-detail" style="display:none">
        <button id="backBtn" class="back-btn">← 返回</button>
        <div id="detailContent"></div>
      </div>
    </main>
  </div>

  <footer class="footer">数据来源：<a href="https://www.tvmaze.com" target="_blank">TVMaze</a></footer>
  <script src="app.js"></script>
</body>
</html>
